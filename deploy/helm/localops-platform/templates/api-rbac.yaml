apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: localops-api-readonly
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: localops-api-readonly
  namespace: {{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: localops-api
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: localops-api-readonly
  apiGroup: rbac.authorization.k8s.io
