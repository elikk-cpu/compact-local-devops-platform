apiVersion: v1
kind: ConfigMap
metadata:
  name: localops-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    release: monitoring
data:
  localops-api-overview.json: |
    {
      "uid": "localops-api-overview",
      "title": "LocalOps API Overview",
      "tags": [
        "localops",
        "api",
        "prometheus"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "API request rate",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(rate(localops_api_requests_total[1m]))",
              "legendFormat": "requests/sec",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 3
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        },
        {
          "id": 2,
          "type": "bargauge",
          "title": "Requests by endpoint",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(localops_api_requests_total) by (exported_endpoint)",
              "legendFormat": "{{exported_endpoint}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0
            },
            "overrides": []
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "API targets UP",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "targets": [
            {
              "expr": "sum(up{job=\"localops-api\"})",
              "legendFormat": "up targets",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Service health",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 6,
            "w": 16,
            "x": 8,
            "y": 8
          },
          "targets": [
            {
              "expr": "localops_service_health",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          }
        }
      ]
    }
