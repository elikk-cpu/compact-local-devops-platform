services:
  worker:
    build:
      context: ../../app/worker
      dockerfile: Dockerfile
    image: localops-worker:dev
    container_name: localops-worker
    ports:
      - "9000:9000"
    environment:
      WORKER_MODE: local
      WORKER_INTERVAL_SECONDS: 10
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
