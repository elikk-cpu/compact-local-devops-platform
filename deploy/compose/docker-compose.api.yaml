services:
  api:
    build:
      context: ../../app/api
      dockerfile: Dockerfile
    image: localops-api:dev
    container_name: localops-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
