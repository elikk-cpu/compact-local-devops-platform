name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build

  python:
    name: Python compile
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api
          - worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Compile Python app
        working-directory: app/${{ matrix.service }}
        run: python -m compileall app

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t localops-api:ci app/api

      - name: Build Worker image
        run: docker build -t localops-worker:ci app/worker

      - name: Build Frontend image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=https://status.local:30443 \
            -t localops-frontend:ci \
            app/frontend
