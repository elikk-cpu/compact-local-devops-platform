<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0" stop-color="#020617" stop-opacity="0"/>
      <stop offset="0.38" stop-color="#06142A" stop-opacity="0.45"/>
      <stop offset="0.72" stop-color="#22124D" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#120826" stop-opacity="0.86"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="72%" cy="62%" r="42%">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.62"/>
      <stop offset="0.36" stop-color="#7C3AED" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="55%" cy="58%" r="34%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tower" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#020617" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#2563EB" stop-opacity="0.65"/>
      <stop offset="0.6" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="towerPink" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#020617" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#7C3AED"/>
      <stop offset="0.72" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2  0 0 0 0 0.85  0 0 0 0 1  0 0 0 0.9 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="purpleBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="floorGrid" width="80" height="32" patternUnits="userSpaceOnUse">
      <path d="M0 0H80M0 32H80M0 0V32M80 0V32" stroke="#7C3AED" stroke-opacity="0.34" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#purpleGlow)"/>
  <rect width="1200" height="360" fill="url(#cyanGlow)"/>

  <!-- distant particles -->
  <g opacity="0.75">
    <circle cx="360" cy="65" r="1.6" fill="#22D3EE"/>
    <circle cx="520" cy="38" r="1.2" fill="#E0F2FE"/>
    <circle cx="690" cy="82" r="1.5" fill="#A855F7"/>
    <circle cx="780" cy="46" r="1.1" fill="#22D3EE"/>
    <circle cx="930" cy="72" r="1.4" fill="#A855F7"/>
    <circle cx="1040" cy="38" r="1" fill="#E0F2FE"/>
  </g>

  <!-- floor perspective -->
  <g transform="translate(210 238) skewX(-18) scale(1 0.45)" opacity="0.72">
    <rect x="0" y="0" width="960" height="250" fill="url(#floorGrid)"/>
    <path d="M0 0H960" stroke="#A855F7" stroke-opacity="0.78" stroke-width="2" filter="url(#glow)"/>
  </g>

  <!-- horizon glow -->
  <rect x="180" y="224" width="980" height="2" fill="url(#towerPink)" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="795" cy="232" rx="230" ry="34" fill="#7C3AED" opacity="0.38" filter="url(#purpleBlur)"/>
  <ellipse cx="865" cy="228" rx="130" ry="22" fill="#22D3EE" opacity="0.18" filter="url(#purpleBlur)"/>

  <!-- skyline silhouettes -->
  <g opacity="0.72">
    <rect x="510" y="172" width="18" height="52" fill="#071426" opacity="0.82"/>
    <rect x="548" y="142" width="28" height="82" fill="#071426" opacity="0.9"/>
    <rect x="604" y="162" width="22" height="62" fill="#071426" opacity="0.86"/>
    <rect x="650" y="118" width="36" height="106" fill="#071426" opacity="0.92"/>
    <rect x="714" y="154" width="26" height="70" fill="#071426" opacity="0.86"/>
    <rect x="770" y="96" width="42" height="128" fill="#071426" opacity="0.94"/>
    <rect x="845" y="135" width="32" height="89" fill="#071426" opacity="0.9"/>
    <rect x="900" y="70" width="48" height="154" fill="#071426" opacity="0.96"/>
    <rect x="982" y="122" width="34" height="102" fill="#071426" opacity="0.9"/>
    <rect x="1040" y="96" width="42" height="128" fill="#071426" opacity="0.92"/>
  </g>

  <!-- neon towers -->
  <g filter="url(#glow)">
    <rect x="420" y="112" width="4" height="112" rx="2" fill="url(#tower)"/>
    <rect x="486" y="76" width="4" height="148" rx="2" fill="url(#tower)"/>
    <rect x="580" y="136" width="4" height="88" rx="2" fill="url(#tower)"/>
    <rect x="672" y="48" width="5" height="176" rx="2.5" fill="url(#towerPink)"/>
    <rect x="760" y="124" width="4" height="100" rx="2" fill="url(#tower)"/>
    <rect x="836" y="28" width="5" height="196" rx="2.5" fill="url(#towerPink)"/>
    <rect x="930" y="98" width="4" height="126" rx="2" fill="url(#tower)"/>
    <rect x="1012" y="56" width="4" height="168" rx="2" fill="url(#towerPink)"/>
    <rect x="1088" y="116" width="4" height="108" rx="2" fill="url(#tower)"/>
  </g>

  <!-- small window/light speckles -->
  <g opacity="0.55" filter="url(#glow)">
    <circle cx="532" cy="190" r="1.3" fill="#22D3EE"/>
    <circle cx="558" cy="176" r="1" fill="#A855F7"/>
    <circle cx="620" cy="196" r="1.2" fill="#22D3EE"/>
    <circle cx="657" cy="152" r="1" fill="#A855F7"/>
    <circle cx="680" cy="176" r="1.2" fill="#22D3EE"/>
    <circle cx="792" cy="150" r="1" fill="#22D3EE"/>
    <circle cx="812" cy="182" r="1.1" fill="#A855F7"/>
    <circle cx="916" cy="116" r="1.2" fill="#22D3EE"/>
    <circle cx="945" cy="164" r="1.1" fill="#A855F7"/>
    <circle cx="1058" cy="136" r="1.1" fill="#22D3EE"/>
    <circle cx="1080" cy="184" r="1" fill="#A855F7"/>
  </g>

  <!-- vignette / fade left -->
  <rect width="520" height="360" fill="url(#bg)" opacity="0"/>
  <linearGradient id="leftFade" x1="0" x2="1">
    <stop offset="0" stop-color="#020617" stop-opacity="0"/>
    <stop offset="0.2" stop-color="#020617" stop-opacity="0.08"/>
    <stop offset="1" stop-color="#020617" stop-opacity="0"/>
  </linearGradient>
  <rect width="1200" height="360" fill="url(#leftFade)"/>
</svg>
